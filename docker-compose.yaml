services:
  db:
    image: postgres:16-alpine
    container_name: hitalent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hitalent_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HTTP_ADDR=${HTTP_ADDR}
      - LOG_LEVEL=${LOG_LEVEL}

      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE}

      - DB_MIGRATION_PATH=/app/migrations
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: hitalent_pgdata